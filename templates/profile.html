{% extends 'base.html' %}

{% block content %}

<div class="card p-4">

    <img
        src="{{ url_for('static',
        filename='uploads/' + user.profile_pic) }}"
        width="120"
        height="120"
        class="rounded-circle mb-3"
    >

    <h2>{{ user.username }}</h2>

    <p>{{ user.bio }}</p>

    <p>
        Followers:
        {{ user.followers_list.count() }}
    </p>

    {% if current_user.id != user.id %}

        {% if user in current_user.followed %}

            <a
                href="{{ url_for('unfollow',
                                 user_id=user.id) }}"
                class="btn btn-danger">

                Unfollow

            </a>

        {% else %}

            <a
                href="{{ url_for('follow',
                                 user_id=user.id) }}"
                class="btn btn-primary">

                Follow

            </a>

        {% endif %}

    {% endif %}

</div>

{% endblock %}
